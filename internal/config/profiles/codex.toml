title = "Codex"
description = "Codex app state, config, network, MCP, and login support"
inherits = ["tool", "keychain"]
default_app = "codex"
env = [
  "HOME",
  "USER",
  "TERM",
  "LANG",
  "SHELL",
  "CODEX_HOME",
  "CODEX_CONNECTORS_TOKEN",
  "CODEX_CA_CERTIFICATE",
  "HTTPS_PROXY",
  "HTTP_PROXY",
  "ALL_PROXY",
  "NO_PROXY",
  "WSS_PROXY",
  "FTP_PROXY",
  "https_proxy",
  "http_proxy",
  "all_proxy",
  "no_proxy",
  "wss_proxy",
  "ftp_proxy",
  "SSL_CERT_FILE",
  "SSL_CERT_DIR",
  "npm_config_http_proxy",
  "npm_config_https_proxy",
  "npm_config_noproxy",
  "NPM_CONFIG_HTTP_PROXY",
  "NPM_CONFIG_HTTPS_PROXY",
  "NPM_CONFIG_NOPROXY",
  "YARN_HTTP_PROXY",
  "YARN_NO_PROXY",
]
rwx = ["$HOME/.codex"]

[macos]
ro = ["$HOME/Library/Preferences"]
