default_profile = "default"

[profiles.default]

[profiles.tool]
rw = ["$TMP/bulle/tmp"]
env = ["PATH"]
add_exec = true
add_libs = true

[profiles.codex]
inherits = "tool"
default_app = "codex"
# Codex's app MCP client appear to require keychain access
allow_keychain = true
env = [
  "HOME",
  "USER",
  "TERM",
  "LANG",
  "SHELL",
  "CODEX_HOME",
  "CODEX_CONNECTORS_TOKEN",
  "CODEX_CA_CERTIFICATE",
  "HTTPS_PROXY",
  "HTTP_PROXY",
  "ALL_PROXY",
  "NO_PROXY",
  "WSS_PROXY",
  "FTP_PROXY",
  "https_proxy",
  "http_proxy",
  "all_proxy",
  "no_proxy",
  "wss_proxy",
  "ftp_proxy",
  "SSL_CERT_FILE",
  "SSL_CERT_DIR",
  "npm_config_http_proxy",
  "npm_config_https_proxy",
  "npm_config_noproxy",
  "NPM_CONFIG_HTTP_PROXY",
  "NPM_CONFIG_HTTPS_PROXY",
  "NPM_CONFIG_NOPROXY",
  "YARN_HTTP_PROXY",
  "YARN_NO_PROXY",
]
rwx = ["$HOME/.codex"]

[profiles.claude]
inherits = "tool"
default_app = "claude"
env = ["HOME", "USER", "TERM", "LANG", "SHELL"]
rw = [
  "$HOME/.claude.json",
]
rwx = [
  "$HOME/.claude",
  "$HOME/.local/share/claude",
]

[profiles.opencode]
inherits = "tool"
default_app = "opencode"
env = ["HOME", "USER", "TERM", "LANG", "SHELL"]
rwx = [
  "$HOME/.config/opencode",
  "$HOME/.local/share/opencode",
  "$HOME/.local/state/opencode",
  "$HOME/.cache/opencode",
]

[profiles.pi]
inherits = "tool"
default_app = "pi"
env = ["HOME", "USER", "TERM", "LANG", "SHELL"]
rwx = ["$HOME/.pi"]
